version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: shelterconnect-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: shelterconnect-backend
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/shelterconnect
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: shelterconnect-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
